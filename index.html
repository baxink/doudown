<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>去水印下载</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .link-btn { transition: all 0.2s; }
    .link-btn:hover { transform: scale(1.03); }
    .toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
      background: #1f2937; color: white; padding: 10px 24px; border-radius: 8px;
      font-size: 14px; z-index: 9999; opacity: 0; transition: opacity 0.3s;
    }
    .toast.show { opacity: 1; }
    .img-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; }
    .img-grid img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; cursor: pointer; }
    .loading-spinner {
      border: 3px solid #e5e7eb; border-top: 3px solid #6366f1;
      border-radius: 50%; width: 28px; height: 28px; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">
  <div class="flex-1 flex items-center justify-center p-4">
    <div class="w-full max-w-2xl">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-gray-800">去水印下载</h1>
      <p class="text-gray-500 mt-2 text-sm">支持抖音、小红书视频/图集解析</p>
    </div>

    <div class="bg-white rounded-2xl shadow-lg p-6 mb-6 fade-in">
      <label class="block text-sm font-medium text-gray-600 mb-2">粘贴分享链接</label>
      <div class="flex gap-3">
        <input id="urlInput" type="text" placeholder="https://v.douyin.com/xxx  或  https://xhslink.com/xxx"
          class="flex-1 px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent"
          onkeydown="if(event.key==='Enter')parse()">
        <button id="parseBtn" onclick="parse()"
          class="px-6 py-3 bg-indigo-500 hover:bg-indigo-600 text-white font-medium rounded-xl text-sm transition flex items-center gap-2 min-w-[90px] justify-center">
          <span id="btnText">解析</span>
          <div id="btnSpinner" class="loading-spinner hidden w-4 h-4"></div>
        </button>
      </div>
      <div id="platformTag" class="mt-2 h-5"></div>
    </div>

    <div id="resultCard" class="bg-white rounded-2xl shadow-lg p-6 hidden fade-in">
      <div class="flex items-center gap-3 mb-4 pb-4 border-b">
        <img id="authorAvatar" src="" class="w-10 h-10 rounded-full object-cover">
        <div>
          <div id="authorName" class="font-medium text-gray-800 text-sm"></div>
          <div id="contentType" class="text-xs text-indigo-500 mt-0.5"></div>
        </div>
      </div>

      <h2 id="contentTitle" class="font-semibold text-gray-800 mb-3 leading-snug"></h2>

      <div id="coverWrapper" class="mb-4">
        <img id="coverImg" src="" class="w-full max-h-72 object-contain rounded-xl bg-gray-50">
      </div>

      <div id="videoWrapper" class="mb-4 hidden">
        <video id="videoPlayer" controls class="w-full max-h-80 rounded-xl"></video>
      </div>

      <div id="imageGallery" class="img-grid mb-4 hidden"></div>
      <div id="livePhotos" class="space-y-4 mb-4 hidden"></div>

      <div id="downloadSection" class="space-y-2"></div>

      <div id="musicInfo" class="mt-4 p-3 bg-gray-50 rounded-xl hidden">
        <div class="text-xs text-gray-500 mb-1">背景音乐</div>
        <div class="text-sm font-medium text-gray-700" id="musicTitle"></div>
      </div>
    </div>

    <div id="errorCard" class="bg-red-50 rounded-2xl shadow p-6 hidden fade-in">
      <div class="flex items-center gap-3">
        <div class="text-red-400 text-xl">⚠️</div>
        <div>
          <div class="font-medium text-red-600">解析失败</div>
          <div id="errorMsg" class="text-sm text-red-500 mt-1"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const BASE = 'https://doudown-proxy.fanxj137616.workers.dev';

    function extractUrl(text) {
      const match = text.match(/https?:\/\/(?:www\.|(?:v|d)\.)?[-a-zA-Z0-9@:%._+~#=]{1,256}[a-zA-Z0-9()]{1,6}\b(?:[-a-zA-Z0-9()@:%_+.~#?&/=]*)/i);
      return match ? match[0] : null;
    }

    function detectPlatform(url) {
      if (/douyin\.com|v\.douyin/.test(url)) return 'douyin';
      if (/xiaohongshu\.com|xhslink\.com|xhs\.com/.test(url)) return 'xiaohongshu';
      return null;
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    function copyText(text) {
      navigator.clipboard.writeText(text).then(() => showToast('已复制到剪贴板'));
    }

    async function downloadFile(url, filename) {
      try {
        showToast('正在下载...');
        const response = await fetch(url);
        if (!response.ok) throw new Error('下载失败');
        const blob = await response.blob();
        const blobUrl = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = blobUrl;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(blobUrl);
        showToast('下载完成');
      } catch (err) {
        showToast('下载失败，已复制链接');
        copyText(url);
        window.open(url, '_blank');
      }
    }

    let currentPlatform = null;

    function parse() {
      const raw = document.getElementById('urlInput').value.trim();
      if (!raw) { showToast('请输入链接'); return; }
      const url = extractUrl(raw);
      if (!url) { showToast('未找到有效链接，请粘贴正确的分享链接'); return; }
      const platform = detectPlatform(url);
      if (!platform) { showToast('无法识别平台，支持抖音和小红书'); return; }
      currentPlatform = platform;
      const apiMap = { douyin: '/api/douyin', xiaohongshu: '/api/xhs' };
      setLoading(true);
      hideResult();
      fetch(BASE + apiMap[platform] + '?url=' + encodeURIComponent(url))
        .then(r => r.text())
        .then(text => {
          let json;
          try { json = JSON.parse(text); } catch { showToast('返回数据格式错误'); setLoading(false); return; }
          setLoading(false);
          if (json.code === 200) renderResult(json.data);
          else showError(json.msg || '解析失败');
        })
        .catch(err => { setLoading(false); showError('网络错误: ' + err.message); });
    }

    function setLoading(loading) {
      const btn = document.getElementById('parseBtn');
      const text = document.getElementById('btnText');
      const spinner = document.getElementById('btnSpinner');
      btn.disabled = loading;
      if (loading) { text.classList.add('hidden'); spinner.classList.remove('hidden'); }
      else { text.classList.remove('hidden'); spinner.classList.add('hidden'); }
    }

    function hideResult() {
      document.getElementById('resultCard').classList.add('hidden');
      document.getElementById('errorCard').classList.add('hidden');
    }

    function showError(msg) {
      hideResult();
      document.getElementById('errorMsg').textContent = msg;
      document.getElementById('errorCard').classList.remove('hidden');
    }

    function renderResult(data) {
      const apiPath = currentPlatform === 'xiaohongshu' ? '/api/xhs' : '/api/douyin';
      const fileTitle = (data.title || data.desc || 'video').replace(/[^\w一-龥]/g, '_').replace(/_+/g, '_').replace(/^_|_$/g, '').slice(0, 30) || 'download';
      hideResult();
      const card = document.getElementById('resultCard');
      card.classList.remove('hidden');

      const tag = document.getElementById('platformTag');
      const isDouyin = /douyin/i.test(JSON.stringify(data)) && (data.author?.id + '').length > 10;
      tag.innerHTML = isDouyin
        ? '<span class="inline-block px-2 py-0.5 bg-pink-100 text-pink-600 text-xs rounded-full">抖音</span>'
        : '<span class="inline-block px-2 py-0.5 bg-red-100 text-red-500 text-xs rounded-full">小红书</span>';

      document.getElementById('authorAvatar').src = data.author?.avatar ? `${BASE}${apiPath}?dl=${encodeURIComponent(data.author.avatar)}` : 'https://via.placeholder.com/40';
      document.getElementById('authorName').textContent = data.author?.name || '';
      const typeLabel = { video: '视频', image: '图集', live: '实况', unknown: '未知' };
      document.getElementById('contentType').textContent = typeLabel[data.type] || data.type;
      document.getElementById('contentTitle').textContent = data.title || data.desc || '';

      const coverWrapper = document.getElementById('coverWrapper');
      if (data.cover) { document.getElementById('coverImg').src = `${BASE}${apiPath}?dl=${encodeURIComponent(data.cover)}`; coverWrapper.classList.remove('hidden'); }
      else coverWrapper.classList.add('hidden');

      const videoWrapper = document.getElementById('videoWrapper');
      videoWrapper.classList.add('hidden');
      if (data.type === 'video' && data.url) {
        document.getElementById('videoPlayer').src = data.url;
        videoWrapper.classList.remove('hidden');
      }

      const gallery = document.getElementById('imageGallery');
      gallery.innerHTML = ''; gallery.classList.add('hidden');
      if ((data.type === 'image' || data.type === 'live') && data.images?.length) {
        gallery.classList.remove('hidden');
        data.images.forEach((img, i) => {
          const div = document.createElement('div');
          div.className = 'relative group';
          const imgSrc = `${BASE}${apiPath}?dl=${encodeURIComponent(img)}`;
          const imgName = `${fileTitle}_${i+1}.jpg`;
          div.innerHTML = `<img src="${imgSrc}" onclick="window.open('${imgSrc}', '_blank')">
            <a href="${imgSrc}&filename=${encodeURIComponent(imgName)}" class="absolute bottom-1 right-1 bg-black/60 text-white text-xs px-2 py-1 rounded transition">下载</a>`;
          gallery.appendChild(div);
        });
      }

      const liveSection = document.getElementById('livePhotos');
      liveSection.innerHTML = ''; liveSection.classList.add('hidden');
      if (data.live_photo?.length) {
        liveSection.classList.remove('hidden');
        data.live_photo.forEach((lp, i) => {
          const div = document.createElement('div');
          div.className = 'rounded-xl overflow-hidden';
          const liveImgSrc = `${BASE}${apiPath}?dl=${encodeURIComponent(lp.image)}`;
          const liveVideoSrc = `${BASE}${apiPath}?dl=${encodeURIComponent(lp.video)}`;
          div.innerHTML = `<img src="${liveImgSrc}" class="w-full h-48 object-cover">
            <div class="p-2 bg-gray-50 flex gap-2">
              <a href="${liveImgSrc}&filename=${encodeURIComponent(fileTitle + '_' + (i+1) + '_photo.jpg')}" class="flex-1 text-center bg-white border text-xs py-1.5 rounded-lg">下载照片</a>
              <a href="${liveVideoSrc}&filename=${encodeURIComponent(fileTitle + '_' + (i+1) + '_video.mp4')}" class="flex-1 text-center bg-indigo-500 text-white text-xs py-1.5 rounded-lg">下载视频</a>
            </div>`;
          liveSection.appendChild(div);
        });
      }

      const dlSection = document.getElementById('downloadSection');
      dlSection.innerHTML = '';
      if (data.type === 'video' && data.url) {
        const videoUrl = `${BASE}${apiPath}?dl=${encodeURIComponent(data.url)}`;
        dlSection.innerHTML = `
          <div class="flex gap-2">
            <a href="${videoUrl}&filename=${encodeURIComponent(fileTitle + '.mp4')}" class="flex-1 text-center bg-indigo-500 hover:bg-indigo-600 text-white font-medium py-2.5 rounded-xl text-sm transition link-btn">下载视频</a>
            <button onclick="copyText('${data.url}')" class="px-5 py-2.5 border border-gray-200 hover:bg-gray-50 rounded-xl text-sm transition">复制链接</button>
          </div>`;
        if (data.video_backup?.length) {
          dlSection.innerHTML += data.video_backup.map((u, i) =>
            `<a href="${BASE}${apiPath}?dl=${encodeURIComponent(u)}&filename=${encodeURIComponent(fileTitle + '_' + (i+1) + '.mp4')}" class="block text-center text-xs text-gray-400 hover:text-indigo-500 mt-1">备用线路${i+1}下载</a>`
          ).join('');
        }
      }

      const musicInfo = document.getElementById('musicInfo');
      if (data.music?.url) {
        document.getElementById('musicTitle').textContent = `${data.music.title || ''} - ${data.music.author || ''}`;
        musicInfo.classList.remove('hidden');
        musicInfo.innerHTML += `<a href="${data.music.url}" download class="block mt-2 text-xs text-indigo-500 hover:underline">下载音乐</a>`;
      } else {
        musicInfo.classList.add('hidden');
      }
    }

    document.getElementById('urlInput').addEventListener('paste', function() {
      setTimeout(() => {
        const raw = this.value.trim();
        const url = extractUrl(raw);
        const platform = detectPlatform(url || raw);
        const tag = document.getElementById('platformTag');
        if (platform === 'douyin') tag.innerHTML = '<span class="inline-block px-2 py-0.5 bg-pink-100 text-pink-600 text-xs rounded-full">检测到: 抖音</span>';
        else if (platform === 'xiaohongshu') tag.innerHTML = '<span class="inline-block px-2 py-0.5 bg-red-100 text-red-500 text-xs rounded-full">检测到: 小红书</span>';
        else tag.innerHTML = '';
      }, 50);
    });
  </script>
  </div>
  <div class="text-center text-xs text-gray-400 py-4 space-y-1">
    <div>v2.4 - 切换回 Cloudflare Worker</div>
    <div class="text-gray-300">更新：Worker恢复，支持抖音/小红书解析</div>
  </div>
</body>
</html>
